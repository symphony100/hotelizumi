<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/x-icon" href="https://symphony100.github.io/hotelizumi/png/IZ.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="keywords" content="ホテルいずみ,ホテル,鎌倉,格安,駅近,旅館,宿,いずみホテル,izumi,hotel">
    <meta name="description" content="ホテルいずみの公式サイトです。">
    <title>ホテルいずみ</title>
    <style>
        /* 全体のリセット */
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            padding-top: 70px; /* 固定ヘッダーの高さ分スペースを確保 */
        }

        /* ヘッダー */
        header {
            display: flex;
            align-items: center;
            background-color: #00AAFF;
            border-bottom: 1px solid #ccc;
            padding: 10px 20px;
            position: fixed; /* ヘッダーを固定 */
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000; /* 他の要素の上に表示 */
        }

        .logo img {
            height: 50px;
        }

        .divider {
            border-left: 2px double #ffffff;
            height: 40px;
            margin: 0 20px;
        }

        nav a {
            text-decoration: none;
            color: #FFFFFF;
            font-size: 16px;
            font-weight: bold;
            margin-right: 15px;
            padding-bottom: 5px;
            position: relative;
        }

        nav a::after {
            content: '';
            display: block;
            width: 0;
            height: 2px;
            background: white;
            transition: width 0.3s ease;
            position: absolute;
            bottom: 0;
            left: 0;
        }

        nav a:hover::after,
        nav a:focus::after {
            width: 100%;
        }

        /* カルーセルのスタイル */
        .carousel-container {
            position: relative;
            width: 60%; /* サイズを調整 */
            margin: 20px auto;
            overflow: hidden;
            border: 2px solid #ccc;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .carousel-track {
            display: flex;
            transition: none; /* エフェクトの速度をなしに */
            width: 100%;
        }

        .carousel-track img {
            width: 100%;
            flex-shrink: 0;
            display: none; /* 初期は非表示 */
        }

        .carousel-track img.active {
            display: block; /* activeクラスがついた画像だけ表示 */
        }

        .carousel-button {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background-color: rgba(0, 0, 0, 0.5);
            color: white;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            font-size: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .carousel-button.prev {
            left: 10px;
        }

        .carousel-button.next {
            right: 10px;
        }

        .carousel-button:hover {
            background-color: rgba(0, 0, 0, 0.8);
        }

        /* フッターのスタイル */
        footer {
            background-color: #c0c0c0;
            text-align: center;
            padding: 20px 0;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <!-- ヘッダー -->
    <header>
        <a href="index.html" class="logo">
            <img src="https://symphony100.github.io/hotelizumi/png/Hotel%20Izumi.png" alt="Hotel Izumi">
        </a>
        <div class="divider"></div>
        <nav>
            <a href="#reservations">予約・料金</a>
            <a href="#map">マップ</a>
            <a href="#sightseeing">観光名所</a>
            <a href="#parking">駐車場</a>
            <a href="#qa">Q＆A</a>
        </nav>
    </header>

    <!-- カルーセル -->
    <div class="carousel-container">
        <div class="carousel-track">
            <img src="https://x.gd/fYZT3" alt="画像1" class="active">
            <img src="https://x.gd/ZiHFc" alt="画像2">
            <img src="https://travel.rakuten.co.jp/mytrip/sites/mytrip/files/styles/main_image/public/migration_article_images/ranking/spot-enoshima-key.jpg?itok=aVinrCgy" alt="画像3">
        </div>
        <button class="carousel-button prev">&lt;</button>
        <button class="carousel-button next">&gt;</button>
    </div>

    <!-- フッター -->
    <footer>
        <p>&copy; 2025 ホテルいずみ All rights reserved.</p>
    </footer>

    <script>
        const track = document.querySelector('.carousel-track');
        const images = document.querySelectorAll('.carousel-track img');
        const imageCount = images.length;
        const prevButton = document.querySelector('.carousel-button.prev');
        const nextButton = document.querySelector('.carousel-button.next');
        let currentIndex = 0;

        function updateCarousel() {
            // すべての画像からactiveクラスを削除
            images.forEach(img => img.classList.remove('active'));
            // 次の画像にactiveクラスを追加
            images[currentIndex].classList.add('active');
        }

        nextButton.addEventListener('click', () => {
            currentIndex = (currentIndex + 1) % imageCount;
            updateCarousel();
        });

        prevButton.addEventListener('click', () => {
            currentIndex = (currentIndex - 1 + imageCount) % imageCount;
            updateCarousel();
        });

        setInterval(() => {
            currentIndex = (currentIndex + 1) % imageCount;
            updateCarousel();
        }, 5000); // 5秒ごとに自動的に次の画像に切り替え
    </script>
</body>
</html>
