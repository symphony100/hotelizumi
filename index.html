<!DOCTYPE html>
<html lang="ja">
<head>
    <!-- アイコン -->
    <link rel="icon" type="image/x-icon" href="https://symphony100.github.io/hotelizumi/png/IZ.png">
    <link rel="sympony" sizes="180x180"  href="https://symphony100.github.io/hotelizumi/png/IZ.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="keywords" content="ホテルいずみ,ホテル,鎌倉,格安,駅近,旅館,宿,いずみホテル,izumi,hotel">
    <meta name="description" content="ホテルいずみの公式サイトです。">
    <title>ホテルいずみ</title>
<style>
        .carousel-container {
            position: relative;
            width: 80%;
            overflow: hidden;
            border: 2px solid #ccc;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        .carousel-track {
            display: flex;
            transition: transform 0.5s ease-in-out;
        }
        .carousel-track img {
            width: 100%;
            flex-shrink: 0;
        }
        .carousel-button {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background-color: rgba(0, 0, 0, 0.5);
            color: white;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            font-size: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
        .carousel-button.prev {
            left: 10px;
        }
        .carousel-button.next {
            right: 10px;
        }
        .carousel-button:hover {
            background-color: rgba(0, 0, 0, 0.8);
        }
    
    body {
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
    }

    /* ヘッダー全体のスタイル */
    header {
        display: flex;
        align-items: center;
        background-color: #00AAFF;
        border-bottom: 1px solid #ccc;
        padding: 10px 20px;
    }

    /* 左の画像部分 */
    .logo {
        margin-right: 20px;
    }

    .logo img {
        height: 50px;
    }

    /* 二重線 */
    .divider {
        border-left: 2px double #ffffff;
        height: 40px;
        margin: 0 20px;
    }

    /* ナビゲーションメニュー */
    nav {
        display: flex;
        gap: 20px;
    }

    nav a {
        text-decoration: none;
        color: #FFFFFF;
        font-size: 16px;
        font-weight: bold;
        position: relative;
    }

    nav a:hover {
        color: #FFFFFF;
    }

    nav a::after {
        content: '';
        display: block;
        width: 0;
        height: 2px;
        background: #FFFFFF;
        transition: width 0.3s;
        position: absolute;
        bottom: -5px;
        left: 0;
    }

    nav a:hover::after {
        width: 100%;
    }

    /* デバイス対応のメディアクエリ */
    @media (max-width: 768px) {
        header {
            flex-direction: column;
            align-items: flex-start;
        }

        .logo {
            margin-right: 0;
            margin-bottom: 10px;
        }

        .divider {
            display: none;
        }

        nav {
            flex-wrap: wrap;
            gap: 10px;
        }

        nav a {
            font-size: 14px;
        }
    }

    @media (max-width: 480px) {
        header {
            padding: 10px;
        }

        .logo img {
            height: 40px;
        }

        nav a {
            font-size: 12px;
        }
    }
</style>

</head>
<body>
    <header>
        <!-- 左のロゴ画像 -->
        <a href="index.html" class="logo">
            <img src="https://symphony100.github.io/hotelizumi/png/Hotel%20Izumi.png" alt="Hotel Izumi">
        </a>

        <!-- 二重線 -->
        <div class="divider"></div>

        <!-- ナビゲーションメニュー -->
        <nav>
            <a href="#reservations">予約・料金</a>
            <a href="#map">マップ</a>
            <a href="#sightseeing">観光名所</a>
            <a href="#parking">駐車場</a>
            <a href="#qa">Q＆A</a>
        </nav>
    </header>
    <div class="carousel-container">
        <div class="carousel-track">
            <img src="https://symphony100.github.io/upload/%E3%83%AD%E3%82%B4%E3%83%9E%E3%83%BC%E3%82%AF.png" alt="画像1">
            <img src="https://symphony100.github.io/upload/%E3%83%AD%E3%82%B4%E3%83%9E%E3%83%BC%E3%82%AF.png" alt="画像2">
            <img src="https://symphony100.github.io/upload/%E3%83%AD%E3%82%B4%E3%83%9E%E3%83%BC%E3%82%AF.png" alt="画像3">
            <img src="https://symphony100.github.io/upload/%E3%83%AD%E3%82%B4%E3%83%9E%E3%83%BC%E3%82%AF.png" alt="画像4">
            <img src="https://symphony100.github.io/upload/%E3%83%AD%E3%82%B4%E3%83%9E%E3%83%BC%E3%82%AF.png" alt="画像5">
            <img src="https://symphony100.github.io/upload/%E3%83%AD%E3%82%B4%E3%83%9E%E3%83%BC%E3%82%AF.png" alt="画像6">
        </div>
        <button class="carousel-button prev">&lt;</button>
        <button class="carousel-button next">&gt;</button>
    </div>

    <script>
        // カルーセルの設定
        const track = document.querySelector('.carousel-track');
        const images = document.querySelectorAll('.carousel-track img');
        const imageCount = images.length;
        const prevButton = document.querySelector('.carousel-button.prev');
        const nextButton = document.querySelector('.carousel-button.next');
        let currentIndex = 0;

        // カルーセルを更新する関数
        function updateCarousel() {
            const translateX = -currentIndex * 100;
            track.style.transform = `translateX(${translateX}%)`;
        }

        // 次へボタン
        nextButton.addEventListener('click', () => {
            currentIndex = (currentIndex + 1) % imageCount;
            updateCarousel();
        });

        // 前へボタン
        prevButton.addEventListener('click', () => {
            currentIndex = (currentIndex - 1 + imageCount) % imageCount;
            updateCarousel();
        });

        // 自動スクロール
        setInterval(() => {
            currentIndex = (currentIndex + 1) % imageCount;
            updateCarousel();
        }, 5000);
    </script>
</body>
</html>
