<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/x-icon" href="https://symphony100.github.io/hotelizumi/png/IZ.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- キーワード・ページ紹介 -->
    <meta name="keywords" content="ホテルいずみ,ホテル,鎌倉,格安,駅近,旅館,宿,いずみホテル,izumi,hotel">
    <meta name="description" content="ホテルいずみの公式サイトです。">
    <title>ホテルいずみ</title>
    <style>
        /* 全体のリセット */
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            opacity: 0;
            transition: opacity 1.5s ease-in;
            padding-top: 70px; /* 固定ヘッダーの高さ分スペースを確保 */
        }
      
        /* ヘッダー */
        header {
            display: flex;
            align-items: center;
            background-color: #00AAFF;
            border-bottom: 1px solid #ccc;
            padding: 10px 20px;
            position: fixed; /* ヘッダーを固定 */
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000; /* 他の要素の上に表示 */
        }

        .logo img {
            height: 50px;
        }

        .divider {
            border-left: 2px double #ffffff;
            height: 40px;
            margin: 0 20px;
        }

        nav a {
            text-decoration: none;
            color: #FFFFFF;
            font-size: 16px;
            font-weight: bold;
            margin-right: 15px;
            padding-bottom: 5px;
            position: relative;
        }

        nav a::after {
            content: '';
            display: block;
            width: 0;
            height: 2px;
            background: white;
            transition: width 0.3s ease;
            position: absolute;
            bottom: 0;
            left: 0;
        }

        nav a:hover::after,
        nav a:focus::after {
            width: 100%;
        }
/* モバイル版用の調整 */
@media (max-width: 768px) {
    nav {
        display: flex;
        flex-wrap: wrap; /* アイテムを折り返す */
        justify-content: center; /* 中央に配置 */
    }

    nav a {
        margin-right: 0;
        padding: 10px;
        font-size: 14px;
    }

    /* ヘッダーの高さを調整 */
    header {
        padding: 10px 15px;
    }
}

        /* カルーセルのスタイル */
        .carousel-container {
            position: relative;
            width: 60%; /* サイズを調整 */
            margin: 20px auto;
            overflow: hidden;
            border: 2px solid #ccc;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .carousel-track {
            display: flex;
            transition: none; /* エフェクトの速度をなしに */
            width: 100%;
        }

        .carousel-track img {
            width: 100%;
            flex-shrink: 0;
            display: none; /* 初期は非表示 */
        }

        .carousel-track img.active {
            display: block; /* activeクラスがついた画像だけ表示 */
        }

        .carousel-button {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background-color: rgba(0, 0, 0, 0.5);
            color: white;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            font-size: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .carousel-button.prev {
            left: 10px;
        }

        .carousel-button.next {
            right: 10px;
        }

        .carousel-button:hover {
            background-color: rgba(0, 0, 0, 0.8);
        }

        /* フッターのスタイル */
        footer {
            background-color: #c0c0c0;
            text-align: center;
            padding: 20px 0;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <!-- ヘッダー -->
    <header>
        <a href="https://symphony100.github.io/hotelizumi/" class="logo">
            <img src="https://symphony100.github.io/hotelizumi/png/Hotel%20Izumi.png" alt="Hotel Izumi">
        </a>
        <div class="divider"></div>
        <nav>
            <a href="#reservations">予約・料金</a>
            <a href="#map">マップ</a>
            <a href="#sightseeing">観光名所</a>
            <a href="#qa">Q＆A</a>
        </nav>
    </header>

    <!-- カルーセル -->
    <div class="carousel-container">
        <div class="carousel-track">
            <img src="https://symphony100.github.io/hotelizumi/png/%E9%8E%8C%E5%80%89%E8%83%8C%E6%99%AF5.png" alt="鎌倉背景1" class="active">
            <img src="https://symphony100.github.io/hotelizumi/png/%E9%8E%8C%E5%80%89%E8%83%8C%E6%99%AF2.png" alt="鎌倉背景2">
            <img src="https://symphony100.github.io/hotelizumi/png/%E9%8E%8C%E5%80%89%E8%83%8C%E6%99%AF3.png" alt="鎌倉背景3">
            <img src="https://symphony100.github.io/hotelizumi/png/%E9%8E%8C%E5%80%89%E8%83%8C%E6%99%AF4.png" alt="鎌倉背景4">
            <img src="https://symphony100.github.io/hotelizumi/png/%E9%8E%8C%E5%80%89%E8%83%8C%E6%99%AF1.png" alt="鎌倉背景5">
        </div>
        <button class="carousel-button prev">&lt;</button>
        <button class="carousel-button next">&gt;</button>
    </div>
    <!-- お知らせセクション -->
    <section id="news" style="text-align: center; padding: 30px; background-color: #f8f8f8; margin: 20px auto; width: 60%; border-radius: 10px; box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);">
        <h2 style="color: #00AAFF; font-size: 22px; margin-bottom: 15px;">お知らせ</h2>
        <p style="font-size: 16px; color: #333; margin-bottom: 10px;">期間限定プランをご用意しました！特別価格でご宿泊いただけます。</p>
        <a href="https://symphony100.github.io/hotelizumi/news" style="display: inline-block; text-decoration: none; background-color: #00AAFF; color: white; padding: 10px 20px; border-radius: 5px; font-weight: bold;">詳しくはこちら</a>
    </section>
<script>
// ページ読み込み時にフェードイン
document.addEventListener("DOMContentLoaded", function() {
    document.body.style.opacity = "1";
});
</script>

    <!-- フッター -->
    <footer>
        <p>&copy; 2024 ホテルいずみ All rights reserved.</p>
    </footer>

    <script>
        const track = document.querySelector('.carousel-track');
        const images = document.querySelectorAll('.carousel-track img');
        const imageCount = images.length;
        const prevButton = document.querySelector('.carousel-button.prev');
        const nextButton = document.querySelector('.carousel-button.next');
        let currentIndex = 0;

        function updateCarousel() {
            // すべての画像からactiveクラスを削除
            images.forEach(img => img.classList.remove('active'));
            // 次の画像にactiveクラスを追加
            images[currentIndex].classList.add('active');
        }

        nextButton.addEventListener('click', () => {
            currentIndex = (currentIndex + 1) % imageCount;
            updateCarousel();
        });

        prevButton.addEventListener('click', () => {
            currentIndex = (currentIndex - 1 + imageCount) % imageCount;
            updateCarousel();
        });

        setInterval(() => {
            currentIndex = (currentIndex + 1) % imageCount;
            updateCarousel();
        }, 5000); // 5秒ごとに自動的に次の画像に切り替え
    </script>
</body>
</html>
