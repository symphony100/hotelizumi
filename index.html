<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="UTF-8">
	<link rel="icon" type="image/x-icon" href="/img/IZ.png">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="keywords" content="ホテルいずみ,ホテル,鎌倉,格安,駅近,旅館,宿,いずみホテル,izumi,hotel">
	<meta name="description" content="鎌倉で最高のひとときを。ホテルいずみでくつろぎの時間を。">
	<!-- 「og」要素 -->
	<meta property="og:title" content="ホテルいずみ">
	<meta property="og:description" content="鎌倉で最高のひとときを。ホテルいずみでくつろぎの時間を。">
	<meta property="og:image" content="img/IZ.png">
	<meta property="og:url" content="/hotelizumi/index.html">
	<meta property="og:type" content="website">
	<title>ホテルいずみ</title>
	<style>
	body {
	            margin: 0;
	            padding: 0;
	            font-family: Arial, sans-serif;
	            opacity: 0;
	            transition: opacity 1.5s ease-in;
	            padding-top: 70px;
	        }
	
	        header {
	            display: flex;
	            align-items: center;
	            background-color: #00AAFF;
	            border-bottom: 1px solid #ccc;
	            padding: 10px 20px;
	            position: fixed;
	            top: 0;
	            left: 0;
	            width: 100%;
	            z-index: 1000;
	        }
	
	        .logo img {
	            height: 50px;
	        }
	
	        .divider {
	            border-left: 2px double #ffffff;
	            height: 40px;
	            margin: 0 20px;
	        }
	
	        nav a {
	            text-decoration: none;
	            color: #FFFFFF;
	            font-size: 16px;
	            font-weight: bold;
	            margin-right: 15px;
	            padding-bottom: 5px;
	            position: relative;
	        }
	
	        nav a::after {
	            content: '';
	            display: block;
	            width: 0;
	            height: 2px;
	            background: white;
	            transition: width 0.3s ease;
	            position: absolute;
	            bottom: 0;
	            left: 0;
	        }
	
	        nav a:hover::after,
	        nav a:focus::after {
	            width: 100%;
	        }
	
	        .carousel-container {
	            position: relative;
	            width: 60%;
	            margin: 20px auto;
	            overflow: hidden;
	            border: 2px solid #ccc;
	            border-radius: 10px;
	            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
	        }
	
	        .carousel-track {
	            display: flex;
	            transition: none;
	            width: 100%;
	        }
	
	        .carousel-track img {
	            width: 100%;
	            flex-shrink: 0;
	            display: none;
	        }
	
	        .carousel-track img.active {
	            display: block;
	        }
	
	        .carousel-button {
	            position: absolute;
	            top: 50%;
	            transform: translateY(-50%);
	            background-color: rgba(0, 0, 0, 0.5);
	            color: white;
	            border: none;
	            border-radius: 50%;
	            width: 40px;
	            height: 40px;
	            font-size: 20px;
	            display: flex;
	            justify-content: center;
	            align-items: center;
	            cursor: pointer;
	        }
	
	        .carousel-button.prev {
	            left: 10px;
	        }
	
	        .carousel-button.next {
	            right: 10px;
	        }
	
	        .carousel-button:hover {
	            background-color: rgba(0, 0, 0, 0.8);
	        }
	
	        .catchphrase {
	            text-align: center;
	            margin-top: 200px;
	        }
	
	        .catchphrase p {
	            font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
	            font-size: 36px;
	            font-weight: bold;
	            color: black;
	            opacity: 0;
	            transform: translateY(20px);
	            transition: opacity 3s ease-out, transform 3s ease-out;
	        }
	
	        .catchphrase p.show {
	            opacity: 1;
	            transform: translateY(0);
	        }
		.carousel-track {
                    display: flex;
                    transition: transform 0.5s ease-in-out;
                }

	
	        footer {
	            background-color: #c0c0c0;
	            text-align: center;
	            padding: 20px 0;
	            font-size: 14px;
	        }
	      /* スマートフォン版画像カルーセル */
	      @media (max-width: 768px) {
	    .carousel-container {
	        width: 90%;
	    }
	    
	    .carousel-track img {
	        height: auto;
	    }
	
	    .carousel-button {
	        width: 50px;
	        height: 50px;
	        font-size: 24px;
	    }
	}
	/* 新着情報（iframe）のスタイル調整 */
#news {
    text-align: center;
    padding: 30px;
    background-color: #f8f8f8;
    margin: 20px auto;
    width: 60%;
    border-radius: 10px;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
}

/* iframe のラップ要素 */
#news-wrapper {
    width: 100%;
    max-width: 100%;
    margin: 0 auto;
    overflow: hidden;
}

/* iframe のスタイル */
#news-frame {
    width: 100%;
    height: 200px;
    border: none;
    scrollbar-width: none; /* Firefox 用 */
    -ms-overflow-style: none; /* IE, Edge 用 */
}

#news-frame::-webkit-scrollbar {
    display: none; /* Chrome, Safari 用 */
}

/* スマートフォン版の調整 */
@media (max-width: 768px) {
    #news {
        width: 90%;
        padding: 20px;
    }
}

	</style>

</head>

<body>
	<!-- ヘッダー -->
	<header>
		<a href="/hotelizumi/index.html" class="logo">
			<img src="img/HotelIzumi.png" alt="Hotel Izumi">
		</a>
		<div class="divider"></div>
		<nav>
			<a href="reservations/index.html">料金</a>
			<a href="map/index.html">マップ</a>
			<a href="sightseeing/index.html">観光</a>
			<a href="qa/index.html">Q＆A</a>
		</nav>
	</header>

	<!-- 画像カルーセル -->
	<div class="carousel-container">
		<div class="carousel-track">
			<img src="img/kamakura-5.png"
			alt="kamakura-1" class="active">
			<img src="img/kamakura-2.png"
			alt="kamakura-2">
			<img src="img/kamakura-3.png"
			alt="kamakura-3">
			<img src="img/kamakura-4.png"
			alt="kamakura-4">
			<img src="img/kamakura-1.png"
			alt="kamakura-5">
		</div>
		<button class="carousel-button prev">&lt;</button>
		<button class="carousel-button next">&gt;</button>
	</div>

	<div class="catchphrase">
		<p>ここ鎌倉で、最高なひとときを。</p>
	</div>
        <!-- 新着情報セクション -->
        <section id="news">
        <h2 style="color: #00AAFF; font-size: 22px; margin-bottom: 15px;">新着情報</h2>

        <!-- iframe を div でラップして横幅を統一 -->
        <div id="news-wrapper">
             <iframe id="news-frame" src="https://symphony100.github.io/hotelizumi/news/index.html"></iframe>
        </div>
        </section>

	<script>
	document.addEventListener("DOMContentLoaded", function() {
		document.body.style.opacity = "1";

		const catchphrase = document.querySelector(".catchphrase p");
		const observer = new IntersectionObserver(entries => {
			entries.forEach(entry => {
				if (entry.isIntersecting) {
					catchphrase.classList.add("show");
				}
			});
		}, {
			threshold: 0.5
		});

		observer.observe(catchphrase);

		const track = document.querySelector('.carousel-track');
		const images = document.querySelectorAll('.carousel-track img');
		const imageCount = images.length;
		const prevButton = document.querySelector('.carousel-button.prev');
		const nextButton = document.querySelector('.carousel-button.next');
		let currentIndex = 0;

		function updateCarousel() {
			images.forEach(img => img.classList.remove('active'));
			images[currentIndex].classList.add('active');
		}

		nextButton.addEventListener('click', () => {
			currentIndex = (currentIndex + 1) % imageCount;
			updateCarousel();
		});

		prevButton.addEventListener('click', () => {
			currentIndex = (currentIndex - 1 + imageCount) % imageCount;
			updateCarousel();
		});

		setInterval(() => {
			currentIndex = (currentIndex + 1) % imageCount;
			updateCarousel();
		}, 5000);
	});

	</script>
	<!-- フッター -->
	<footer>
		<p>&copy; 2024 ホテルいずみ All rights reserved.</p>
		<p>
			<a href="site-map/index.html">サイトマップ</a>
		</p>
	</footer>
</body>

</html>
